<!DOCTYPE html>
<html>
<head>
  <title>Admin - DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0a0a0a; color:#fff; }
    .sidebar { background:#111; min-height:100vh; width:240px; position:fixed; top:0; left:0; padding:20px 0; border-right:1px solid #222; }
    .sidebar .brand { padding:16px 24px; font-size:20px; font-weight:800; border-bottom:1px solid #222; margin-bottom:10px; }
    .sidebar .brand span { color:#FFD700; }
    .sidebar a { display:block; padding:12px 24px; color:#aaa; text-decoration:none; font-size:14px; transition:all 0.2s; }
    .sidebar a:hover, .sidebar a.active { color:#FFD700; background:#1a1a1a; border-left:3px solid #FFD700; }
    .main { margin-left:240px; padding:40px; }
    .stat-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:24px; }
    .stat-card h2 { color:#FFD700; font-size:36px; font-weight:800; }
    table { background:#1a1a1a; }
    table thead { background:#111; }
    .badge-confirmed { background:#198754; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="brand">DRIVE<span>LUX</span> <small class="text-secondary fs-6">Admin</small></div>
    <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint == 'admin_dashboard' }}">Dashboard</a>
    <a href="{{ url_for('admin_cars') }}" class="{{ 'active' if request.endpoint == 'admin_cars' }}">Manage Cars</a>
    <a href="{{ url_for('admin_users') }}" class="{{ 'active' if request.endpoint == 'admin_users' }}">Users</a>
    <a href="{{ url_for('admin_create_account') }}" class="{{ 'active' if request.endpoint == 'admin_create_account' }}">Admin Account</a>
    <a href="{{ url_for('admin_bookings') }}" class="{{ 'active' if request.endpoint == 'admin_bookings' }}">Bookings</a>
    <a href="{{ url_for('home') }}" style="margin-top:20px;">View Site</a>
    <a href="{{ url_for('admin_logout') }}" style="color:#dc3545;">Logout</a>
  </div>
  <div class="main">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
