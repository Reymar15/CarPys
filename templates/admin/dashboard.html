{% extends "admin/base.html" %}
{% block content %}
<h2 class="fw-bold mb-4">Dashboard</h2>
<div class="row g-4 mb-5">
  <div class="col-md-4">
    <div class="stat-card">
      <p class="text-secondary mb-1">Total Cars</p>
      <h2>{{ total_cars }}</h2>
    </div>
  </div>
  <div class="col-md-4">
    <div class="stat-card">
      <p class="text-secondary mb-1">Total Users</p>
      <h2>{{ total_users }}</h2>
    </div>
  </div>
  <div class="col-md-4">
    <div class="stat-card">
      <p class="text-secondary mb-1">Total Bookings</p>
      <h2>{{ total_bookings }}</h2>
    </div>
  </div>
</div>
<div class="d-flex gap-3">
  <a href="{{ url_for('admin_cars') }}" class="btn btn-warning fw-bold px-4">Manage Cars</a>
  <a href="{{ url_for('admin_bookings') }}" class="btn btn-outline-warning fw-bold px-4">View Bookings</a>
  <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary fw-bold px-4">View Users</a>
</div>
{% endblock %}
