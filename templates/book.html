<!DOCTYPE html>
<html>
<head>
  <title>Book {{ car.name }} – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary">
    <div class="container-fluid px-5">
      <a class="navbar-brand fw-bold fs-4" href="{{ url_for('home') }}">DRIVE<span class="text-warning">LUX</span></a>
      <div class="d-flex ms-auto align-items-center gap-3">
        <a class="nav-link text-white" href="{{ url_for('home') }}">Home</a>
        <a class="nav-link text-white" href="{{ url_for('cars') }}">Browse Cars</a>
        <a class="nav-link text-white" href="{{ url_for('my_bookings') }}">My Bookings</a>
        <span class="text-warning fw-bold">{{ user }}</span>
        <a class="btn btn-outline-warning fw-bold px-4" href="{{ url_for('logout') }}">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container py-5" style="max-width:600px;">
    <a href="{{ url_for('car_detail', car_id=car.id) }}" class="text-warning text-decoration-none mb-3 d-inline-block">← Back to Details</a>
    <h2 class="fw-bold mt-2 mb-1">Book <span class="text-warning">{{ car.name }}</span></h2>
    <p class="text-secondary mb-4">{{ car.price }}</p>

    <div class="bg-dark p-4 rounded mb-4">
      <img src="{{ car.image }}" alt="{{ car.name }}" class="w-100 rounded mb-3" style="height:200px;object-fit:cover;">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label text-secondary">Pick-up Date</label>
          <input type="date" name="pickup" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary">Drop-off Date</label>
          <input type="date" name="dropoff" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold py-3">Confirm Booking</button>
      </form>
    </div>
  </div>

  <footer class="bg-dark text-secondary text-center py-4 border-top border-secondary">
    <p class="mb-0">© 2026 DriveLux. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
