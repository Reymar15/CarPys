<!DOCTYPE html>
<html>
<head>
  <title>Browse Cars – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary">
    <div class="container-fluid px-5">
      <a class="navbar-brand fw-bold fs-4" href="{{ url_for('home') }}">DRIVE<span class="text-warning">LUX</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center gap-3">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link active text-warning" href="{{ url_for('cars') }}">Browse Cars</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('my_bookings') }}">My Bookings</a></li>
          <li class="nav-item"><span class="nav-link text-warning">{{ user }}</span></li>
          <li class="nav-item"><a class="btn btn-outline-warning fw-bold px-4" href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="bg-dark py-5 border-bottom border-secondary">
    <div class="container-fluid px-5">
      <h1 class="fw-bold">Browse <span class="text-warning">Cars</span></h1>
      <p class="text-secondary mb-0">Choose from our premium fleet of luxury vehicles.</p>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="container-fluid px-5 py-4">
    <div class="d-flex gap-2 flex-wrap mb-4">
      <button class="btn btn-warning fw-bold filter-btn active" data-filter="all">All</button>
      <button class="btn btn-outline-secondary fw-bold filter-btn" data-filter="SUV">SUV</button>
      <button class="btn btn-outline-secondary fw-bold filter-btn" data-filter="Sports">Sports</button>
      <button class="btn btn-outline-secondary fw-bold filter-btn" data-filter="Luxury">Luxury</button>
    </div>

    <!-- CAR GRID -->
    <div class="row g-4">
      {% for car in cars %}
      <div class="col-md-4 car-item" data-category="{{ car.category }}">
        <div class="car-card rounded overflow-hidden">
          <img src="{{ car.image }}" alt="{{ car.name }}" class="w-100" style="height:210px;object-fit:cover;">
          <div class="p-3">
            <span class="badge bg-warning text-dark mb-2">{{ car.category }}</span>
            <h5 class="fw-bold mb-1">{{ car.name }}</h5>
            <p class="text-warning fw-bold mb-3">{{ car.price }}</p>
            <a href="{% if 'Range Rover' in car.name %}{{ url_for('brand', brand_name='Range Rover') }}{% elif 'BMW' in car.name %}{{ url_for('brand', brand_name='BMW') }}{% elif 'Ferrari' in car.name %}{{ url_for('brand', brand_name='Ferrari') }}{% elif 'Mercedes' in car.name %}{{ url_for('brand', brand_name='Mercedes') }}{% elif 'Lamborghini' in car.name %}{{ url_for('brand', brand_name='Lamborghini') }}{% elif 'Porsche' in car.name %}{{ url_for('brand', brand_name='Porsche') }}{% elif 'Audi' in car.name %}{{ url_for('brand', brand_name='Audi') }}{% elif 'Bentley' in car.name %}{{ url_for('brand', brand_name='Bentley') }}{% elif 'Toyota' in car.name %}{{ url_for('brand', brand_name='Toyota') }}{% elif 'McLaren' in car.name %}{{ url_for('brand', brand_name='McLaren') }}{% else %}#{% endif %}" class="btn btn-warning w-100 fw-bold">View Details</a>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-secondary text-center py-4 border-top border-secondary mt-5">
    <p class="mb-0">© 2026 DriveLux. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".filter-btn").forEach(b => {
          b.classList.remove("btn-warning", "active");
          b.classList.add("btn-outline-secondary");
        });
        this.classList.add("btn-warning", "active");
        this.classList.remove("btn-outline-secondary");

        const filter = this.dataset.filter;
        document.querySelectorAll(".car-item").forEach(item => {
          item.style.display = (filter === "all" || item.dataset.category === filter) ? "block" : "none";
        });
      });
    });
  </script>
</body>
</html>
