<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background:#0a0a0a; color:#fff; }</style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="p-4 rounded w-100" style="max-width:420px; background:#1a1a1a; border:1px solid #2a2a2a;">
    <h3 class="fw-bold text-center mb-1">Forgot <span class="text-warning">Password</span></h3>
    <p class="text-secondary text-center mb-4">Enter your email to receive a reset link.</p>
    {% if message %}
    <div class="alert alert-success py-2">{{ message }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-secondary">Email</label>
        <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">Send Reset Link</button>
    </form>
    <p class="text-center text-secondary mt-3 mb-0"><a href="{{ url_for('login') }}" class="text-warning">Back to Login</a></p>
  </div>
</body>
</html>
