<!DOCTYPE html>
<html>
<head>
  <title>Login Code - DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

  <div class="p-4 rounded auth-box w-100" style="max-width:420px;">
    <h3 class="fw-bold mb-1 text-center">Enter Login Code</h3>
    <p class="text-secondary text-center mb-4">We sent a 6-digit code to <span class="text-warning fw-bold">{{ email }}</span></p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login_code') }}">
      <div class="mb-4">
        <label class="form-label text-secondary">6-digit code</label>
        <input type="text" name="code" class="form-control bg-dark text-white border-secondary text-center fw-bold" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">Verify Code</button>
    </form>

    <p class="text-center text-secondary mt-3 mb-0"><a href="{{ url_for('login') }}" class="text-warning">Back to Login</a></p>
  </div>

</body>
</html>
