<!DOCTYPE html>
<html>
<head>
  <title>My Profile – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary">
    <div class="container-fluid px-5">
      <a class="navbar-brand fw-bold fs-4" href="{{ url_for('home') }}">DRIVE<span class="text-warning">LUX</span></a>
      <div class="d-flex ms-auto align-items-center gap-3">
        <a class="nav-link text-white" href="{{ url_for('home') }}">Home</a>
        <a class="nav-link text-white" href="{{ url_for('cars') }}">Browse Cars</a>
        <a class="nav-link text-white" href="{{ url_for('my_bookings') }}">My Bookings</a>
        <a class="nav-link text-white" href="{{ url_for('user_messages') }}">Messages</a>
        <a class="nav-link active text-warning" href="{{ url_for('profile') }}">Profile</a>
        <span class="text-warning fw-bold">{{ user }}</span>
        <a class="btn btn-outline-warning fw-bold px-4" href="{{ url_for('logout') }}">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container py-5" style="max-width:560px;">
    <h2 class="fw-bold mb-4 border-start border-warning border-4 ps-3">My <span class="text-warning">Profile</span></h2>

    {% if message %}
    <div class="alert alert-success py-2">{{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <div class="auth-box p-4 rounded">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label text-secondary">Username</label>
          <input type="text" name="username" class="form-control bg-dark text-white border-secondary" value="{{ user_data.get('username', '') }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label text-secondary">Email</label>
          <input type="email" name="email" class="form-control bg-dark text-white border-secondary" value="{{ user_data.get('email', '') }}" required>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary">New Password <span class="text-secondary small">(leave blank to keep current)</span></label>
          <input type="password" name="password" class="form-control bg-dark text-white border-secondary">
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold">Update Profile</button>
      </form>
    </div>
  </div>

  <footer class="bg-dark text-secondary text-center py-4 border-top border-secondary mt-5">
    <p class="mb-0">© 2026 DriveLux. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
