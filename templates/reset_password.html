<!DOCTYPE html>
<html>
<head>
  <title>Reset Password – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background:#0a0a0a; color:#fff; }</style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="p-4 rounded w-100" style="max-width:420px; background:#1a1a1a; border:1px solid #2a2a2a;">
    <h3 class="fw-bold text-center mb-1">Reset <span class="text-warning">Password</span></h3>
    <p class="text-secondary text-center mb-4">Enter your new password.</p>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-secondary">New Password</label>
        <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required minlength="6">
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">Reset Password</button>
    </form>
  </div>
</body>
</html>
