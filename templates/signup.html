<!DOCTYPE html>
<html>
<head>
  <title>Sign Up – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

  <div class="p-4 rounded auth-box w-100" style="max-width:420px;">
    <h3 class="fw-bold mb-1 text-center">Create Account</h3>
    <p class="text-secondary text-center mb-4">Join <span class="text-warning fw-bold">DriveLux</span> today</p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-secondary">Username</label>
        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
      </div>
      <div class="mb-3">
        <label class="form-label text-secondary">Email</label>
        <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary">Password</label>
        <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">Create Account</button>
    </form>

    <p class="text-center text-secondary mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-warning">Login</a></p>
  </div>

</body>
</html>
