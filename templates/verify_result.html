<!DOCTYPE html>
<html>
<head>
  <title>Email Verification – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background:#0a0a0a; color:#fff; }</style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="text-center p-4 rounded" style="max-width:460px; background:#1a1a1a; border:1px solid #2a2a2a;">
    <h1 style="font-size:48px;">{{ '✅' if success else '❌' }}</h1>
    <h3 class="fw-bold mt-3">{{ 'Success!' if success else 'Failed' }}</h3>
    <p class="text-secondary mt-2">{{ message }}</p>
    <a href="{{ url_for('login') }}" class="btn btn-warning fw-bold px-4 mt-2">Go to Login</a>
  </div>
</body>
</html>
