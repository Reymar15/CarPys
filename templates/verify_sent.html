<!DOCTYPE html>
<html>
<head>
  <title>Verify Email – DriveLux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background:#0a0a0a; color:#fff; }</style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="text-center p-4 rounded" style="max-width:460px; background:#1a1a1a; border:1px solid #2a2a2a;">
    <h1 style="font-size:48px;">📧</h1>
    <h3 class="fw-bold mt-3">Check your email</h3>
    <p class="text-secondary mt-2">We sent a verification link to <span class="text-warning">{{ email }}</span>. Click the link to activate your account.</p>
    <p class="text-secondary small">Didn't receive it? Check your spam folder.</p>
    <a href="{{ url_for('login') }}" class="btn btn-warning fw-bold px-4 mt-2">Go to Login</a>
  </div>
</body>
</html>
